<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SCAN PACKING PRO</title>
<!-- ใช้ ZXing Library แทน jsQR เพื่อให้สแกนได้ทั้ง Barcode และ QR -->
<script src="https://unpkg.com/@zxing/browser@latest/umd/index.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&family=JetBrains+Mono:wght@700&display=swap');

  :root {
    --bg: #060d1a; --surface: #0e1826; --border: #1c2e45;
    --accent: #00c8f0; --success: #00e676; --danger: #ff3d3d; --text: #ddeeff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); padding: 15px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
  .title { font-size: 20px; font-weight: 800; color: var(--accent); margin-bottom: 15px; text-align: center; }

  /* Camera Styling */
  #video-container { position: relative; width: 100%; background: #000; border-radius: 12px; overflow: hidden; display: none; border: 2px solid var(--accent); }
  #video-preview { width: 100%; display: block; }
  
  .scanner-overlay {
    position: absolute; inset: 0; border: 2px solid rgba(0,200,240,0.2);
    display: flex; align-items: center; justify-content: center; pointer-events: none;
  }
  .target-box { width: 250px; height: 150px; border: 2px solid var(--accent); position: relative; box-shadow: 0 0 20px rgba(0,200,240,0.4); }
  .scan-line { position: absolute; width: 100%; height: 2px; background: var(--accent); animation: scan 2s infinite; }
  @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

  .btn { 
    width: 100%; padding: 12px; border-radius: 10px; border: none; cursor: pointer; 
    font-weight: 700; font-family: 'Sarabun'; transition: 0.2s; margin-top: 10px;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-stop { background: var(--danger); color: #fff; }

  .input-field { 
    width: 100%; padding: 12px; background: #162032; border: 1px solid var(--border); 
    border-radius: 10px; color: #fff; font-size: 16px; margin-top: 10px;
  }
  .status { padding: 10px; border-radius: 10px; text-align: center; margin-top: 10px; font-size: 14px; }
  .status.idle { background: #1c2e45; }
  .status.success { background: rgba(0,230,118,0.2); color: var(--success); }
</style>
</head>
<body>

<div class="card">
  <div class="title">📦 SCAN PACKING</div>
  
  <input type="text" id="operator-name" class="input-field" placeholder="ชื่อผู้ปฏิบัติงาน...">
  
  <button id="cam-btn" class="btn btn-primary" onclick="toggleScanner()">📷 เปิดกล้องสแกน Barcode/QR</button>

  <div id="video-container">
    <video id="video-preview"></video>
    <div class="scanner-overlay">
      <div class="target-box"><div class="scan-line"></div></div>
    </div>
  </div>

  <input type="text" id="order-input" class="input-field" placeholder="สแกนหรือพิมพ์เลข Order...">
</div>

<div id="status-bar" class="status idle">พร้อมใช้งาน</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwFaC5E-cplXXO9HzLy8KQpsQJApwht1KYiU90DtSfr4DWlY5FpOwYiMVDXgpKqQ1a5/exec';
let codeReader = null;
let isScanning = false;

async function toggleScanner() {
  const container = document.getElementById('video-container');
  const btn = document.getElementById('cam-btn');

  if (isScanning) {
    stopScanner();
    return;
  }

  try {
    isScanning = true;
    container.style.display = 'block';
    btn.textContent = '⏹ ปิดกล้อง';
    btn.className = 'btn btn-stop';

    // สร้าง Reader รองรับทุกรูปแบบ (QR + Barcode)
    codeReader = new ZXingBrowser.BrowserMultiFormatReader();
    
    // ค้นหากล้องหลัง
    const videoInputDevices = await ZXingBrowser.BrowserCodeReader.listVideoInputDevices();
    const selectedDeviceId = videoInputDevices.length > 1 ? videoInputDevices[1].deviceId : videoInputDevices[0].deviceId;

    const videoEl = document.getElementById('video-preview');

    // เริ่มสแกนแบบ Real-time
    await codeReader.decodeFromVideoDevice(selectedDeviceId, videoEl, (result, err) => {
      if (result) {
        document.getElementById('order-input').value = result.getText();
        processOrder(result.getText());
        
        // ใส่ Feedback สั้นๆ ว่าสแกนติด
        vibratePhone(); 
      }
    });

  } catch (err) {
    console.error(err);
    alert('ไม่สามารถเปิดกล้องได้: ' + err.message);
    stopScanner();
  }
}

function stopScanner() {
  if (codeReader) {
    codeReader.reset();
    codeReader = null;
  }
  isScanning = false;
  document.getElementById('video-container').style.display = 'none';
  const btn = document.getElementById('cam-btn');
  btn.textContent = '📷 เปิดกล้องสแกน Barcode/QR';
  btn.className = 'btn btn-primary';
}

function vibratePhone() {
  if (navigator.vibrate) navigator.vibrate(100);
}

async function processOrder(orderNo) {
  const status = document.getElementById('status-bar');
  const name = document.getElementById('operator-name').value;
  
  status.textContent = "⌛ กำลังส่งข้อมูล: " + orderNo;
  status.className = "status idle";

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({
        orderNo: orderNo,
        name: name,
        time: new Date().toLocaleTimeString(),
        date: new Date().toLocaleDateString()
      })
    });

    status.textContent = "✅ บันทึกสำเร็จ: " + orderNo;
    status.className = "status success";
    
    // ถ้าสแกนผ่านกล้อง อาจจะอยากให้หยุดแป๊บนึงค่อยสแกนต่อ (กันซ้ำ)
    // หรือถ้าอยากให้สแกนรัวๆ ก็ไม่ต้องใส่หน่วงเวลาครับ
  } catch (err) {
    status.textContent = "❌ ผิดพลาด: " + err.message;
    status.className = "status idle";
  }
}

// รองรับการพิมพ์เลขเองแล้วกด Enter
document.getElementById('order-input').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    processOrder(e.target.value);
    e.target.value = '';
  }
});
</script>
</body>
</html>
